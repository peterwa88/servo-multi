<html>
<head>
<title>Certificate error</title>
<script id="servo-ui-keyboard-clipboard-patch">
document.addEventListener("keydown", function(e) {
  const ctrl = e.ctrlKey || e.metaKey;
  if (!ctrl) return;

  const key = (e.key || "").toLowerCase();

  // Allow default browser editing shortcuts in editable regions
  const active = document.activeElement;
  const editable =
    active &&
    (
      active.tagName === "INPUT" ||
      active.tagName === "TEXTAREA" ||
      active.isContentEditable
    );

  if (key === "a" || key === "c" || key === "v" || key === "x") {
    if (editable) {
      return;
    }

    // For non-editable page text, allow select all and copy
    if (key === "a") {
      try {
        const range = document.createRange();
        range.selectNodeContents(document.body);
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
        e.preventDefault();
      } catch (_) {}
      return;
    }

    if (key === "c") {
      try {
        const sel = window.getSelection();
        const text = sel ? sel.toString() : "";
        if (text && navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).catch(() => {});
        }
      } catch (_) {}
      return;
    }
  }
}, true);
</script>
</head>
<body>
  <p>${reason}</p>
  <button id="leave" onclick="history.back()">Go back (recommended)</button>
  <button id="allow">Allow certificate temporarily</button>
  <div style="word-break: break-all; font-family: monospace" id="bytes">${bytes}</div>
  <script>
    let bytes = document.getElementById('bytes').textContent;
    let button = document.getElementById('allow');
    let exitButton = document.getElementById('leave');
    if (bytes.length) {
        button.onclick = function() {
            let xhr = new XMLHttpRequest();
            xhr.open('POST', 'chrome:allowcert');
            xhr.onloadend = function() {
                location.reload(true);
            };
            xhr.send("${secret}&${bytes}");
        };
    } else {
        button.style.display = "none";
    }
  </script>
</body>
</html>
